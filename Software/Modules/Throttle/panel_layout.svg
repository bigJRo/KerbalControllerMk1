<svg viewBox="0 0 340 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="340" height="420" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Header -->
  <text x="16" y="18" font-size="9" fill="#6b7280" font-weight="500" letter-spacing="1">THROTTLE MODULE</text>
  <text x="16" y="30" font-size="9" fill="#9ca3af" font-family="monospace">0x2C · Type 0x0D · THR_CAP_MOTORIZED</text>

  <!-- Slider -->
  <text x="170" y="52" font-size="8" fill="#9ca3af" text-anchor="middle">Motorized slide potentiometer (10k)</text>
  <rect x="60" y="58" width="220" height="160" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Slider track -->
  <rect x="158" y="74" width="24" height="128" rx="4" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <!-- Slider knob at ~50% -->
  <rect x="148" y="124" width="44" height="28" rx="4" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="148" y1="138" x2="192" y2="138" stroke="#9ca3af" stroke-width="1"/>

  <!-- Touch indicator -->
  <text x="170" y="100" font-size="7.5" fill="#9ca3af" text-anchor="middle">AT42QT1010</text>
  <text x="170" y="112" font-size="7.5" fill="#9ca3af" text-anchor="middle">capacitive touch</text>

  <!-- Range labels -->
  <text x="220" y="80" font-size="8" fill="#374151">100%</text>
  <text x="220" y="200" font-size="8" fill="#374151">0%</text>

  <!-- Wiper annotation -->
  <text x="85" y="140" font-size="7.5" fill="#9ca3af">PA2</text>
  <text x="85" y="151" font-size="7.5" fill="#9ca3af">WIPER</text>

  <!-- Motor annotation -->
  <text x="170" y="218" font-size="7.5" fill="#6b7280" text-anchor="middle">L293D H-bridge · +9V motor · SPEED PWM on PB3</text>
  <text x="170" y="228" font-size="7.5" fill="#9ca3af" text-anchor="middle">MTR_FWD=PB4 · MTR_REV=PB5 · bang-bang + slowdown</text>

  <!-- Buttons row -->
  <text x="170" y="252" font-size="8" fill="#9ca3af" text-anchor="middle">Discrete LED buttons (2N3904 switched · all ON when enabled)</text>

  <!-- THRTL_100 -->
  <rect x="18" y="260" width="70" height="70" rx="6" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="53" cy="278" r="6" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <text x="53" y="296" font-size="8" font-weight="500" fill="#374151" text-anchor="middle">100%</text>
  <text x="53" y="308" font-size="7" fill="#9ca3af" text-anchor="middle">THRTL_100</text>
  <text x="53" y="320" font-size="7" fill="#9ca3af" text-anchor="middle">PA6 · LED PA7</text>

  <!-- THRTL_UP -->
  <rect x="98" y="260" width="70" height="70" rx="6" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="133" cy="278" r="6" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <text x="133" y="296" font-size="8" font-weight="500" fill="#374151" text-anchor="middle">▲ UP</text>
  <text x="133" y="308" font-size="7" fill="#9ca3af" text-anchor="middle">THRTL_UP</text>
  <text x="133" y="320" font-size="7" fill="#9ca3af" text-anchor="middle">PB2 · LED PC0</text>

  <!-- THRTL_DOWN -->
  <rect x="178" y="260" width="70" height="70" rx="6" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="213" cy="278" r="6" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <text x="213" y="296" font-size="8" font-weight="500" fill="#374151" text-anchor="middle">▼ DOWN</text>
  <text x="213" y="308" font-size="7" fill="#9ca3af" text-anchor="middle">THRTL_DOWN</text>
  <text x="213" y="320" font-size="7" fill="#9ca3af" text-anchor="middle">PC1 · LED PC2</text>

  <!-- THRTL_00 -->
  <rect x="258" y="260" width="70" height="70" rx="6" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="293" cy="278" r="6" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <text x="293" y="296" font-size="8" font-weight="500" fill="#374151" text-anchor="middle">0%</text>
  <text x="293" y="308" font-size="7" fill="#9ca3af" text-anchor="middle">THRTL_00</text>
  <text x="293" y="320" font-size="7" fill="#9ca3af" text-anchor="middle">PC3 · LED PA1</text>

  <!-- LED state note -->
  <rect x="18" y="342" width="304" height="22" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="170" y="354" font-size="7.5" fill="#92400e" text-anchor="middle" font-weight="500">All LEDs ON when enabled · All LEDs OFF when disabled</text>
  <text x="170" y="364" font-size="7" fill="#b45309" text-anchor="middle">Discrete indicator LEDs — no color, on/off only</text>

  <!-- Power note -->
  <text x="18" y="384" font-size="7.5" fill="#9ca3af">Power: +5V VCC from main board · +12V bus → CJ7809 LDO → +9V motor supply</text>
  <text x="18" y="396" font-size="7.5" fill="#9ca3af">Step: ±51 ADC counts (~5% range) · Precision mode: ±10% of INT16_MAX around anchor</text>
  <text x="18" y="408" font-size="7.5" fill="#9ca3af">KC-01-1861/1862 v1.1 · Jeb's Controller Works</text>
</svg>
