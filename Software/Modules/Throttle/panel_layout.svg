<svg viewBox="0 0 360 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="360" height="440" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Header -->
  <text x="16" y="18" font-size="9" fill="#6b7280" font-weight="500" letter-spacing="1">THROTTLE MODULE</text>
  <text x="16" y="30" font-size="9" fill="#9ca3af" font-family="monospace">0x2C · Type 0x0D · THR_CAP_MOTORIZED</text>

  <!-- Column labels -->
  <text x="90" y="50" font-size="8" fill="#9ca3af" text-anchor="middle">Motorized slider (10k)</text>
  <text x="260" y="50" font-size="8" fill="#9ca3af" text-anchor="middle">Buttons (discrete LEDs)</text>

  <!-- ======= SLIDER (left column) ======= -->
  <rect x="18" y="58" width="144" height="300" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Slider track -->
  <rect x="80" y="76" width="24" height="264" rx="4" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>

  <!-- 100% label -->
  <text x="60" y="84" font-size="8" fill="#374151" text-anchor="end">100%</text>

  <!-- Slider knob at ~40% from top -->
  <rect x="68" y="174" width="48" height="28" rx="4" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="68" y1="188" x2="116" y2="188" stroke="#9ca3af" stroke-width="1"/>

  <!-- 0% label -->
  <text x="60" y="334" font-size="8" fill="#374151" text-anchor="end">0%</text>

  <!-- Touch sensor note -->
  <text x="90" y="358" font-size="7.5" fill="#6b7280" text-anchor="middle">AT42QT1010</text>
  <text x="90" y="369" font-size="7.5" fill="#9ca3af" text-anchor="middle">capacitive touch · PA3</text>

  <!-- Wiper annotation -->
  <text x="130" y="195" font-size="7" fill="#9ca3af">WIPER</text>
  <text x="130" y="205" font-size="7" fill="#9ca3af">PA2</text>

  <!-- Motor note -->
  <text x="90" y="384" font-size="7" fill="#9ca3af" text-anchor="middle">L293D · SPEED=PB3 · FWD=PB4 · REV=PB5</text>

  <!-- ======= BUTTONS (right column, vertical, top-to-bottom) ======= -->

  <!-- THRTL_100 -->
  <rect x="178" y="58" width="164" height="66" rx="6" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="205" cy="78" r="8" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="260" y="82" font-size="9" font-weight="500" fill="#374151" text-anchor="middle">100% Throttle</text>
  <text x="260" y="96" font-size="7.5" fill="#9ca3af" text-anchor="middle">THRTL_100 · PA6</text>
  <text x="260" y="108" font-size="7" fill="#9ca3af" text-anchor="middle">LED PA7 · blue</text>

  <!-- THRTL_UP -->
  <rect x="178" y="134" width="164" height="66" rx="6" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="205" cy="154" r="8" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="260" y="158" font-size="9" font-weight="500" fill="#374151" text-anchor="middle">▲ Throttle Up</text>
  <text x="260" y="172" font-size="7.5" fill="#9ca3af" text-anchor="middle">THRTL_UP · PB2</text>
  <text x="260" y="184" font-size="7" fill="#9ca3af" text-anchor="middle">LED PC0 · blue · +51 ADC</text>

  <!-- THRTL_DOWN -->
  <rect x="178" y="210" width="164" height="66" rx="6" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="205" cy="230" r="8" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="260" y="234" font-size="9" font-weight="500" fill="#374151" text-anchor="middle">▼ Throttle Down</text>
  <text x="260" y="248" font-size="7.5" fill="#9ca3af" text-anchor="middle">THRTL_DOWN · PC1</text>
  <text x="260" y="260" font-size="7" fill="#9ca3af" text-anchor="middle">LED PC2 · blue · -51 ADC</text>

  <!-- THRTL_00 -->
  <rect x="178" y="286" width="164" height="66" rx="6" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="205" cy="306" r="8" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="260" y="310" font-size="9" font-weight="500" fill="#374151" text-anchor="middle">0% Throttle</text>
  <text x="260" y="324" font-size="7.5" fill="#9ca3af" text-anchor="middle">THRTL_00 · PC3</text>
  <text x="260" y="336" font-size="7" fill="#9ca3af" text-anchor="middle">LED PA1 · blue</text>

  <!-- LED state note -->
  <rect x="178" y="364" width="164" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="260" y="377" font-size="7.5" fill="#1e40af" text-anchor="middle" font-weight="500">All LEDs ON when enabled</text>
  <text x="260" y="388" font-size="7" fill="#3b82f6" text-anchor="middle">All OFF when disabled</text>

  <!-- Footer -->
  <text x="16" y="412" font-size="7.5" fill="#9ca3af">Step: ±51 ADC (~5%) · Precision: ±10% INT16_MAX around anchor · +5V logic · +12V→+9V motor</text>
  <text x="16" y="424" font-size="7.5" fill="#9ca3af">KC-01-1861/1862 v1.1 · Jeb's Controller Works</text>
</svg>
