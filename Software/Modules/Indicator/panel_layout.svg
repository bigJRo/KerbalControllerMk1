       ===================================================== -->

  <!-- px0 COMM ACTIVE — SKY #0ea5e9 -->
  <rect x="18" y="52" width="88" height="142" rx="6" fill="#0ea5e918" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="62" y="108" font-size="9" font-weight="500" fill="#0369a1" text-anchor="middle">COMM</text>
  <text x="62" y="121" font-size="9" font-weight="500" fill="#0369a1" text-anchor="middle">ACTIVE</text>
