<svg viewBox="0 0 634 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect width="634" height="320" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <text x="16" y="18" font-size="9" fill="#6b7280" font-weight="500" letter-spacing="1">INDICATOR MODULE</text>
  <text x="16" y="30" font-size="9" fill="#9ca3af" font-family="monospace">0x2F · Type 0x10 · 16 × SK6812mini-012</text>

  <!-- Row labels -->
