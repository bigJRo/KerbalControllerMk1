  <!-- Legend -->
  <text x="18" y="284" font-size="7.5" fill="#9ca3af">ACTIVE state colors shown · OFF = unlit · ENABLED = dim white · WARNING = 500ms amber flash · ALERT = 150ms red flash</text>
  <text x="18" y="296" font-size="7.5" fill="#9ca3af">ARMED = cyan static · PARTIAL_DEPLOY = amber static · NeoPixel chain on PA5 · SK6812mini-012 RGB · Jeb's Controller Works</text>

