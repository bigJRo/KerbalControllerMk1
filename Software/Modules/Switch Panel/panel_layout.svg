  <text x="16" y="275" font-size="7.5" fill="#9ca3af">Row 1 (odd): SW1 SW3 SW5 SW7 SW9 · Row 2 (even): SW2 SW4 SW6 SW8 SW10</text>
  <text x="16" y="287" font-size="7.5" fill="#9ca3af">KC-01 Switch Panel Input Module v1.0 · Jeb's Controller Works</text>
